<script>
    const els = {
        imageUpload: document.getElementById('imageUpload'),
        maxSize: document.getElementById('maxSize'),
        minSize: document.getElementById('minSize'),
        falloff: document.getElementById('falloff'),
        sensitivity: document.getElementById('sensitivity'),
        maxSizeVal: document.getElementById('maxSizeVal'),
        minSizeVal: document.getElementById('minSizeVal'),
        falloffVal: document.getElementById('falloffVal'),

        minNeutralize: document.getElementById('minNeutralize'),
        nativeSize: document.getElementById('nativeSize'),
        applyBtn: document.getElementById('applyBtn'),
        resetBtn: document.getElementById('resetBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        mainCanvas: document.getElementById('mainCanvas'),
        loader: document.getElementById('loader'),
        loaderText: document.getElementById('loaderText'),
        resolutionInfo: document.getElementById('resolutionInfo'),
        statsInfo: document.getElementById('statsInfo')
    };

    const ctx = els.mainCanvas.getContext('2d', { willReadFrequently: true });
    let originalImage = null;
    let qualityFactor = 0.75; // default

    // 品質按鈕
    document.querySelectorAll('.quality-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.quality-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            qualityFactor = parseFloat(btn.dataset.quality);
        });
    });

    // UI 綁定與防呆
    ['maxSize', 'minSize', 'falloff', 'sensitivity'].forEach(id => {
        els[id].addEventListener('input', (e) => {
            els[id + 'Val'].textContent = e.target.value;
            if (id === 'maxSize' && parseInt(els.maxSize.value) < parseInt(els.minSize.value)) {
                els.minSize.value = els.maxSize.value; els.minSizeVal.textContent = els.minSize.value;
            }
            if (id === 'minSize' && parseInt(els.minSize.value) > parseInt(els.maxSize.value)) {
                els.maxSize.value = els.minSize.value; els.maxSizeVal.textContent = els.maxSize.value;
            }
        });
    });

    // 繪製測試圖
    function drawPlaceholder() {
        const w = 900, h = 600;
        els.mainCanvas.width = w; els.mainCanvas.height = h;
        els.resolutionInfo.textContent = `${w} x ${h}`;
        
        let grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#475569');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);

        ctx.fillStyle = '#ef4444';
        ctx.beginPath(); ctx.arc(250, 300, 120, 0, Math.PI * 2); ctx.fill();
        
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath(); ctx.moveTo(650, 150); ctx.lineTo(800, 450); ctx.lineTo(500, 450); ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.font = '900 70px sans-serif'; ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 15;
        ctx.fillText('GRADIENT', w/2, h/2 - 20);
        
        ctx.font = '24px sans-serif'; ctx.shadowBlur = 5;
        ctx.fillStyle = '#cbd5e1';
        ctx.fillText('上傳照片或直接點擊生成測試效果', w/2, h/2 + 50);
        ctx.shadowBlur = 0;

        originalImage = new Image();
        originalImage.src = els.mainCanvas.toDataURL();
    }
    drawPlaceholder();

    // 載入圖片
    els.imageUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                
                // nativeSize 開啟 → 完全保留原尺寸,不做任何縮放
                // 關閉 → 套用 1600px 安全上限
                if (!els.nativeSize.checked) {
                    const MAX_SIZE = 1600; 
                    if (w > MAX_SIZE || h > MAX_SIZE) {
                        const ratio = Math.min(MAX_SIZE / w, MAX_SIZE / h);
                        w = Math.round(w * ratio); h = Math.round(h * ratio);
                    }

                els.resolutionInfo.textContent = `${w} x ${h}`;

                originalImage = new Image();
                originalImage.src = els.mainCanvas.toDataURL();

            img.src = evt.target.result;

    els.resetBtn.addEventListener('click', () => {

        els.statsInfo.textContent = 'Seeds: --';

    els.downloadBtn.addEventListener('click', () => {

    /* =========================================================
       漸進式適應 Voronoi - 核心演算法
       
       核心思路:
       1. 計算邊緣強度圖 (sobel-like luma gradient)
       2. 對邊緣圖做距離變換 (Distance Transform via JFA)
          -> 得到每個像素「距離最近邊緣的距離」
       3. 用此距離映射到「期望晶體尺寸」: 近邊緣=小, 遠邊緣=大
          -> 形成密度場
       4. 用 Poisson-Disk-like 採樣按密度場灑種子
          -> 種子間距等於該位置的目標晶體尺寸
       5. JFA 生成 Voronoi
       6. Luma morphological filter 上色
       ========================================================= */

    // 1. 邊緣強度圖 (回傳 0/1 二值圖,用於距離變換)
    function computeEdgeMap(imageData, threshold) {
        const { width: W, height: H, data } = imageData;
        const edgeMap = new Uint8Array(W * H);

        for (let y = 1; y < H - 1; y++) {
            for (let x = 1; x < W - 1; x++) {
                const getLuma = (ox, oy) => {
                    const idx = ((y + oy) * W + (x + ox)) * 4;
                    return data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
                };
                const dx = Math.abs(getLuma(1, 0) - getLuma(-1, 0));
                const dy = Math.abs(getLuma(0, 1) - getLuma(0, -1));
                if ((dx + dy) > threshold) {
                    edgeMap[y * W + x] = 1;
                }
            }
        }
        return edgeMap;
    }

    // 2. 距離變換 (使用 JFA, 計算每個像素到最近 edge 的距離)
    // 為了效率,在降採樣的網格上計算
    function computeDistanceField(edgeMap, W, H, downsample) {
        const dW = Math.max(1, Math.ceil(W / downsample));
        const dH = Math.max(1, Math.ceil(H / downsample));
        
        // 建立 seeds: 每個 edge pixel 變成一個 seed (in downsampled coord)
        // 使用 closest edge coord array
        const nearestX = new Int32Array(dW * dH).fill(-1);
        const nearestY = new Int32Array(dW * dH).fill(-1);

        // 將 edge pixel 投影到降採樣網格
        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                if (edgeMap[y * W + x]) {
                    const dx = Math.floor(x / downsample);
                    const dy = Math.floor(y / downsample);
                    const idx = dy * dW + dx;
                    if (nearestX[idx] === -1) {
                        nearestX[idx] = x;
                        nearestY[idx] = y;
                    }
                }
            }
        }

        // JFA on downsampled grid
        let step = Math.pow(2, Math.ceil(Math.log2(Math.max(dW, dH))) - 1);
        const tmpX = new Int32Array(dW * dH);
        const tmpY = new Int32Array(dW * dH);

        while (step >= 1) {
            tmpX.set(nearestX);
            tmpY.set(nearestY);
            for (let y = 0; y < dH; y++) {
                for (let x = 0; x < dW; x++) {
                    const cx = x * downsample + downsample / 2;
                    const cy = y * downsample + downsample / 2;
                    const idx = y * dW + x;
                    let bestX = nearestX[idx];
                    let bestY = nearestY[idx];
                    let bestDist = (bestX === -1) ? Infinity : 
                        (cx - bestX) * (cx - bestX) + (cy - bestY) * (cy - bestY);

                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = x + dx * step;
                            const ny = y + dy * step;
                            if (nx >= 0 && nx < dW && ny >= 0 && ny < dH) {
                                const nIdx = ny * dW + nx;
                                const ex = nearestX[nIdx];
                                const ey = nearestY[nIdx];
                                if (ex !== -1) {
                                    const dist = (cx - ex) * (cx - ex) + (cy - ey) * (cy - ey);
                                    if (dist < bestDist) {
                                        bestDist = dist;
                                        bestX = ex;
                                        bestY = ey;
                                    }
                                }
                            }
                        }
                    }
                    tmpX[idx] = bestX;
                    tmpY[idx] = bestY;
                }
            }
            nearestX.set(tmpX);
            nearestY.set(tmpY);
            step = Math.floor(step / 2);
        }

        // 回傳一個 sampler: 給定原圖座標,回傳到最近 edge 的距離
        return function getDistance(x, y) {
            const dx = Math.min(dW - 1, Math.floor(x / downsample));
            const dy = Math.min(dH - 1, Math.floor(y / downsample));
            const idx = dy * dW + dx;
            const ex = nearestX[idx];
            const ey = nearestY[idx];
            if (ex === -1) return Infinity;
            return Math.sqrt((x - ex) * (x - ex) + (y - ey) * (y - ey));
        };
    }

    // 3. 距離 → 期望晶體尺寸的映射
    function distanceToSize(dist, minSize, maxSize, falloff) {
        // smoothstep: dist=0 → minSize, dist>=falloff → maxSize
        const t = Math.min(1, dist / falloff);
        // smoothstep 曲線,讓過渡更自然
        const s = t * t * (3 - 2 * t);
        return minSize + (maxSize - minSize) * s;
    }

    // 4. 基於密度場的 Poisson-Disk-like 採樣
    // 用空間網格加速。每個位置的最小間距 = distanceToSize(dist)
    function generateGradientSeeds(W, H, getDistance, minSize, maxSize, falloff) {
        // 網格 cellSize 設下限避免 minSize=1 時網格膨脹到 W*H
        // 但仍然要小於 minSize 才能精確檢查,所以取 max(2, minSize)
        const cellSize = Math.max(2, minSize);
        const gW = Math.ceil(W / cellSize);
        const gH = Math.ceil(H / cellSize);
        const grid = new Array(gW * gH).fill(null);
        const seeds = [];

        // 計算「期望種子數」上限,避免無限迴圈
        // 使用空間掃描方式:從上到下、從左到右,每個位置嘗試放種子
        // 更穩定的做法是 Bridson Poisson Disk,這裡用簡化的網格抖動法
        
        // 方法: 在每個 cellSize 網格中嘗試放點,點的間距由密度場決定
        // 這比 Bridson 簡單但效果接近(且確定性更好)
        
        // 先用密度場計算每個網格目標點密度,再用泊松分布採樣
        // 簡化:走訪每個 cellSize 網格的中心,根據局部期望尺寸決定是否放點
        
        // 採用更可靠的方法:基於 dart-throwing 的網格採樣
        // 對每個 cell,計算該位置的 targetSize,然後以 targetSize 為間距放置
        
        // 實作:以最小尺寸為網格步進,在每格中根據局部期望尺寸決定放點機率
        // 這樣可以保證細節區密度高、平坦區密度低
        
        const tryAddSeed = (x, y) => {
            const dist = getDistance(x, y);
            const targetSize = distanceToSize(dist, minSize, maxSize, falloff);
            const minDist = targetSize; // 該點與最近種子的最小距離
            const minDistSq = minDist * minDist;
            
            // 檢查附近網格內的現有種子
            const gx = Math.floor(x / cellSize);
            const gy = Math.floor(y / cellSize);
            const checkRadius = Math.ceil(targetSize / cellSize) + 1;
            
            for (let dy = -checkRadius; dy <= checkRadius; dy++) {
                for (let dx = -checkRadius; dx <= checkRadius; dx++) {
                    const nx = gx + dx, ny = gy + dy;
                    if (nx < 0 || nx >= gW || ny < 0 || ny >= gH) continue;
                    const cell = grid[ny * gW + nx];
                    if (cell !== null) {
                        const ddx = x - cell.x, ddy = y - cell.y;
                        // 用 max(target, neighborTarget) 防止距離不對稱
                        const neighborSize = cell.size;
                        const requiredDistSq = Math.max(targetSize, neighborSize) ** 2 * 0.65;
                        if (ddx * ddx + ddy * ddy < requiredDistSq) return false;
                    }
                }
            }
            
            if (grid[gy * gW + gx] === null) {
                const seed = { x, y, size: targetSize };
                grid[gy * gW + gx] = seed;
                seeds.push(seed);
                return true;
            }
            return false;
        };

        // 用鋸齒掃描順序 + 抖動,從密度高的細節區開始放點
        // 為確保細節區優先,先收集所有候選位置並按密度排序
        const candidates = [];
        // 取樣 stride 有下限,避免 minSize=1 時候選點數量爆炸
        const SAMPLE_STRIDE_FLOOR = 2;
        const stride = Math.max(SAMPLE_STRIDE_FLOOR, Math.floor(minSize * 0.7));
        for (let y = 0; y < H; y += stride) {
            for (let x = 0; x < W; x += stride) {
                const jx = x + (Math.random() - 0.5) * stride;
                const jy = y + (Math.random() - 0.5) * stride;
                const cx = Math.max(0, Math.min(W - 1, jx));
                const cy = Math.max(0, Math.min(H - 1, jy));
                const dist = getDistance(cx, cy);
                candidates.push({ x: cx, y: cy, priority: dist });
            }
        }
        // 按照 priority 排序: 距離邊緣越近(小)優先放,確保細節先佔位
        candidates.sort((a, b) => a.priority - b.priority);
        
        for (const c of candidates) {
            tryAddSeed(c.x, c.y);
        }
        
        // 補充第二輪掃描,填滿空隙
        const stride2 = Math.max(SAMPLE_STRIDE_FLOOR, Math.floor(minSize * 0.5));
        for (let y = stride2 / 2; y < H; y += stride2) {
            for (let x = stride2 / 2; x < W; x += stride2) {
                const jx = x + (Math.random() - 0.5) * stride2 * 0.8;
                const jy = y + (Math.random() - 0.5) * stride2 * 0.8;
                tryAddSeed(
                    Math.max(0, Math.min(W - 1, jx)),
                    Math.max(0, Math.min(H - 1, jy))
                );
            }
        }

        return seeds;
    }

    // 5. JFA 生成 Voronoi (在降採樣網格上,然後上採樣回原解析度)
    function computeJFA(W, H, seeds, downsample) {
        const dW = Math.max(1, Math.ceil(W / downsample));
        const dH = Math.max(1, Math.ceil(H / downsample));
        
        let ping = new Int32Array(dW * dH).fill(-1);
        let pong = new Int32Array(dW * dH).fill(-1);
        const seedX = new Float32Array(seeds.length);
        const seedY = new Float32Array(seeds.length);
        
        for (let i = 0; i < seeds.length; i++) {
            seedX[i] = seeds[i].x;
            seedY[i] = seeds[i].y;
            const px = Math.min(dW - 1, Math.max(0, Math.floor(seeds[i].x / downsample)));
            const py = Math.min(dH - 1, Math.max(0, Math.floor(seeds[i].y / downsample)));
            // 衝突時保留先到的 (保證所有 seed 在 JFA 期間都有機會傳播)
            if (ping[py * dW + px] === -1) {
                ping[py * dW + px] = i;
            }
        }

        // 對於沒能放進降採樣網格的 seed,額外注入 (放在最接近的空格,或就用同格的)
        // 先收集已存的 seed id
        const placed = new Set();
        for (let i = 0; i < dW * dH; i++) {
            if (ping[i] !== -1) placed.add(ping[i]);
        }
        // 沒被放置的 seed 強制覆寫到目標格(這會讓某些 seed 被擠掉,但 JFA 後會自然修正)
        for (let i = 0; i < seeds.length; i++) {
            if (placed.has(i)) continue;
            const px = Math.min(dW - 1, Math.max(0, Math.floor(seeds[i].x / downsample)));
            const py = Math.min(dH - 1, Math.max(0, Math.floor(seeds[i].y / downsample)));
            ping[py * dW + px] = i;
        }

        let step = Math.pow(2, Math.ceil(Math.log2(Math.max(dW, dH))) - 1);

        while (step >= 1) {
            for (let y = 0; y < dH; y++) {
                for (let x = 0; x < dW; x++) {
                    const idx = y * dW + x;
                    // 使用 cell center 作為查詢座標 (原圖空間)
                    const cx = x * downsample + downsample / 2;
                    const cy = y * downsample + downsample / 2;
                    let bestId = ping[idx];
                    let bestDist = Infinity;

                    if (bestId !== -1) {
                        const dx = cx - seedX[bestId];
                        const dy = cy - seedY[bestId];
                        bestDist = dx * dx + dy * dy; 
                    }

                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = x + dx * step;
                            const ny = y + dy * step;
                            if (nx >= 0 && nx < dW && ny >= 0 && ny < dH) {
                                const checkId = ping[ny * dW + nx];
                                if (checkId !== -1) {
                                    const cdx = cx - seedX[checkId];
                                    const cdy = cy - seedY[checkId];
                                    const dist = cdx * cdx + cdy * cdy;
                                    if (dist < bestDist) {
                                        bestDist = dist;
                                        bestId = checkId;
                                    }
                                }
                            }
                        }
                    }
                    pong[idx] = bestId;
                }
            }
            let temp = ping; ping = pong; pong = temp;
            step = Math.floor(step / 2);
        }

        // 上採樣到原始解析度: 對於原圖的每個像素,計算它屬於哪個 seed
        // 在 downsample > 1 時,直接從降採樣 voronoi 查表會有鋸齒
        // 改用:對原圖每個像素,從降採樣網格周邊 seeds 中找最近的
        const fullMap = new Int32Array(W * H);
        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                const dx = Math.min(dW - 1, Math.floor(x / downsample));
                const dy = Math.min(dH - 1, Math.floor(y / downsample));
                
                // 比對自己和鄰近 cell 的 seed
                let bestId = ping[dy * dW + dx];
                let bestDist = bestId === -1 ? Infinity :
                    (x - seedX[bestId]) ** 2 + (y - seedY[bestId]) ** 2;
                
                for (let oy = -1; oy <= 1; oy++) {
                    for (let ox = -1; ox <= 1; ox++) {
                        if (ox === 0 && oy === 0) continue;
                        const nx = dx + ox, ny = dy + oy;
                        if (nx < 0 || nx >= dW || ny < 0 || ny >= dH) continue;
                        const id = ping[ny * dW + nx];
                        if (id === -1) continue;
                        const d = (x - seedX[id]) ** 2 + (y - seedY[id]) ** 2;
                        if (d < bestDist) {
                            bestDist = d;
                            bestId = id;
                        }
                    }
                }
                fullMap[y * W + x] = bestId;
            }
        }
        
        return { voronoiMap: fullMap, numSeeds: seeds.length };
    }

    // 6. 真實像素採樣濾鏡
    function applyTrueMorphologicalFilter(imageData, voronoiMap, numSeeds, mode) {
        const { width: W, height: H, data } = imageData;
        const resultData = new Uint8ClampedArray(data.length);
        
        const bestPixelIndex = new Int32Array(numSeeds).fill(-1);
        const bestVal = new Float32Array(numSeeds);
        if (mode === 'max') bestVal.fill(-1);
        else bestVal.fill(Infinity);

        for (let i = 0; i < W * H; i++) {
            const id = voronoiMap[i];
            if (id === -1 || id >= numSeeds) continue; 
            const idx = i * 4;
            const r = data[idx], g = data[idx + 1], b = data[idx + 2];
            const luma = r * 0.299 + g * 0.587 + b * 0.114;
            if (mode === 'max') {
                if (luma > bestVal[id]) {
                    bestVal[id] = luma;
                    bestPixelIndex[id] = i;
                }
            } else {
                if (luma < bestVal[id]) {
                    bestVal[id] = luma;
                    bestPixelIndex[id] = i;
                }
            }
        }

        for (let i = 0; i < W * H; i++) {
            const id = voronoiMap[i];
            const targetIdx = i * 4;
            if (id !== -1 && id < numSeeds && bestPixelIndex[id] !== -1) {
                const sourceIdx = bestPixelIndex[id] * 4;
                resultData[targetIdx] = data[sourceIdx];
                resultData[targetIdx + 1] = data[sourceIdx + 1];
                resultData[targetIdx + 2] = data[sourceIdx + 2];
            } else {
                resultData[targetIdx] = data[targetIdx];
                resultData[targetIdx + 1] = data[targetIdx + 1];
                resultData[targetIdx + 2] = data[targetIdx + 2];
            }
            resultData[targetIdx + 3] = data[targetIdx + 3];
        }
        return new ImageData(resultData, W, H);
    }

    // --- 執行流程 ---
    async function runAdaptiveFilter() {
        if (!originalImage) return;
        if (window.innerWidth < 1024) els.mainCanvas.scrollIntoView({ behavior: 'smooth', block: 'center' });

        els.loader.style.display = 'flex';
        els.applyBtn.disabled = true;
        els.applyBtn.classList.add('opacity-70', 'cursor-wait');
        
        await new Promise(resolve => setTimeout(resolve, 50));

        try {
            const W = els.mainCanvas.width;
            const H = els.mainCanvas.height;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = W; tempCanvas.height = H;
            const tCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            tCtx.drawImage(originalImage, 0, 0);
            
            let currentImgData = tCtx.getImageData(0, 0, W, H);
            const config = {
                maxSize: parseInt(els.maxSize.value),
                minSize: parseInt(els.minSize.value),
                falloff: parseInt(els.falloff.value),
                sensitivity: parseInt(els.sensitivity.value)
            };

            // 品質因子: 降採樣倍數的反向
            // 品質越高 → downsample 越接近 1 (越接近原解析度計算)
            // 品質低時 → downsample 較大,計算更快
            const downsample = Math.max(1, Math.round(1 / qualityFactor));

            let totalSeedsCount = 0;

            // [階段一: MAX]
            els.loaderText.textContent = `計算邊緣與距離場 (品質 x${qualityFactor})... (1/3)`;
            await new Promise(resolve => setTimeout(resolve, 30));
            
            const edgeMap1 = computeEdgeMap(currentImgData, config.sensitivity);
            const getDist1 = computeDistanceField(edgeMap1, W, H, downsample);

            els.loaderText.textContent = '依密度場灑種子點... (2/3)';
            await new Promise(resolve => setTimeout(resolve, 30));
            
            const seedsMax = generateGradientSeeds(W, H, getDist1, config.minSize, config.maxSize, config.falloff);
            totalSeedsCount += seedsMax.length;

            els.loaderText.textContent = '建構 Voronoi 拓撲並上色... (3/3)';
            await new Promise(resolve => setTimeout(resolve, 30));
            
            const jfaMax = computeJFA(W, H, seedsMax, downsample);
            currentImgData = applyTrueMorphologicalFilter(currentImgData, jfaMax.voronoiMap, jfaMax.numSeeds, 'max');

            // [階段二: MIN 中和]
            if (els.minNeutralize.checked) {
                els.loaderText.textContent = '重組拓撲並執行暗部收縮...';
                await new Promise(resolve => setTimeout(resolve, 30));
                
                const edgeMap2 = computeEdgeMap(currentImgData, config.sensitivity);
                const getDist2 = computeDistanceField(edgeMap2, W, H, downsample);
                const seedsMin = generateGradientSeeds(W, H, getDist2, config.minSize, config.maxSize, config.falloff);
                totalSeedsCount += seedsMin.length;
                const jfaMin = computeJFA(W, H, seedsMin, downsample);
                currentImgData = applyTrueMorphologicalFilter(currentImgData, jfaMin.voronoiMap, jfaMin.numSeeds, 'min');
            }

            ctx.putImageData(currentImgData, 0, 0);
            els.statsInfo.textContent = `Seeds: ${totalSeedsCount.toLocaleString()}`;

        } catch (err) {
            console.error(err);
            alert('運算過程中發生錯誤: ' + err.message);
        } finally {
            els.loader.style.display = 'none';
            els.applyBtn.disabled = false;
            els.applyBtn.classList.remove('opacity-70', 'cursor-wait');
        }
    }

    els.applyBtn.addEventListener('click', runAdaptiveFilter);
</script>
